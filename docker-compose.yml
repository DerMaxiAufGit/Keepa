services:
  postgres:
    image: postgres:16-alpine
    container_name: keepa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: keepa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: keepa
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keepa"]
      interval: 5s
      timeout: 5s
      retries: 5

  keepa:
    build: .
    container_name: keepa
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env

volumes:
  pgdata:
